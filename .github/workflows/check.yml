name: check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: skills/scripts
      - run: uv run ruff check .
        working-directory: skills/scripts
      - run: uv run ruff format --check .
        working-directory: skills/scripts
      - run: uv sync
        working-directory: security_layer
      - run: uv run ruff check . --exclude mutants
        working-directory: security_layer

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: skills/scripts
      - run: uv run basedpyright sync-index.py
        working-directory: skills/scripts
      - run: uv sync
        working-directory: security_layer
      - run: uv run basedpyright __init__.py budget.py classifier.py hitl.py incident.py models.py output_validation.py permissions.py pii.py scanning.py state_machine.py trifecta.py
        working-directory: security_layer
        env:
          PYTHONPATH: ${{ github.workspace }}

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: skills/scripts
      - run: uv run pytest -x -q
        working-directory: skills/scripts

  test-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: security_layer
      - run: uv run pytest ../tests/ -q
        working-directory: security_layer

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: skills/scripts
      - run: uv run pip-audit
        working-directory: skills/scripts

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: skills/scripts
      - run: uv run python sync-index.py validate
        working-directory: skills/scripts

  deadcode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: skills/scripts
      - run: uv run vulture sync-index.py
        working-directory: skills/scripts

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: skills/scripts
      - run: uv run bandit -r sync-index.py -ll
        working-directory: skills/scripts
